<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Contact Us | Village Kitchen</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body{
    margin:0;
    font-family:'Poppins',sans-serif;
    background:url('contact.jpeg') center/cover no-repeat fixed;
    color:#3b2a1a;
}

/* Light Mud Overlay */
.overlay{
    background:rgba(245,);
    min-height:100vh;
    padding:30px;
}

.container{
    max-width:1100px;
    margin:auto;
}

h1{
    font-family:'Playfair Display',serif;
    text-align:center;
    font-size:3rem;
    margin-bottom:5px;
}

.subtitle{
    text-align:center;
    font-size:1.2rem;
    margin-bottom:30px;
}

.section{
    background:#fff3e0;
    border:3px solid #8b5e3c;
    border-radius:15px;
    padding:25px;
    box-shadow:0 8px 20px rgba(0,0,0,0.2);
    margin-bottom:30px;
}

.section h2{
    font-family:'Playfair Display',serif;
    margin-bottom:15px;
    color:#6b3b1e;
}

.info p{
    margin:6px 0;
    font-size:1rem;
}

.franchise{
    background:#fff8ed;
    padding:15px;
    border-radius:12px;
    margin:15px 0;
    border-left:6px solid #9c5a2e;
    box-shadow:0 5px 12px rgba(0,0,0,0.1);
}

.map{
    margin-top:15px;
    border-radius:12px;
    overflow:hidden;
    border:4px solid #6b3b1e;
}

.map iframe{
    width:100%;
    height:250px;
    border:0;
}

.buttons{
    display:flex;
    gap:15px;
    margin-top:20px;
}

.btn{
    flex:1;
    text-align:center;
    padding:14px;
    border-radius:40px;
    font-weight:600;
    cursor:pointer;
    transition:0.3s;
    background:linear-gradient(145deg,#9c5a2e,#6b3b1e);
    color:#fff;
    box-shadow:0 6px 0 #4a2712;
}

.btn:hover{
    transform:translateY(-2px);
}

.popup{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.5);
    display:none;
    align-items:center;
    justify-content:center;
}

.popup-content{
    background:#fff3e0;
    padding:25px;
    border-radius:15px;
    text-align:center;
}
.close{
    margin-top:15px;
    cursor:pointer;
    font-weight:600;
}
/* HEADER */
.header{
  background:url("images (51).jpeg") center/cover no-repeat;
  padding:15px 25px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  position:relative;
}.header{
  z-index:1000;
}

.nav{
  z-index:999;
}

.nav a{
  color:#f5e6c8;
  margin:0 12px;
  text-decoration:none;
  font-weight:500;
}

.logo img{
  font-family:'Playfair Display',serif;
  
 width:200px;
  
  border-radius:8px;
  text-align:center;
}

/* TOGGLE ICON */
.menu-toggle{
  display:none;
  font-size:30px;
  color:#fff;
  cursor:pointer;
}

/* ---------- MOBILE ---------- */
@media(max-width:768px){
  .menu-toggle{
    display:block;
  }

  .nav{
    position:absolute;
    top:100%;
    left:0;
    width:100%;
    background:#4b2e1a;
    display:none;
    flex-direction:column;
    text-align:center;
    padding:10px 0;
  }

  .nav a{
    padding:12px;
    display:block;
    border-bottom:1px solid rgba(255,255,255,0.1);
  }

  .nav.show{
    display:flex;
  }

  .logo{
    font-size:20px;
  }
}
</style>
</head>

<body><header class="header">
  <div class="menu-toggle" onclick="toggleMenu()">☰</div>

  <nav class="nav left">
    <a href="index.html">Home</a>
    <a href="about.html">About</a>
     <a href="menu.html">Menu</a>
    <a href="contact.html">Contact</a>
  </nav>
<div class="logo">
  <img src="logo.png" alt="">
  </div>
</header>
<div class="overlay">
<div class="container">

<h1>Village Kitchen</h1>
<p class="subtitle">Authentic Village Taste 🌾</p>

<!-- Main Contact -->
<div class="section">
<h2>Head Branch</h2>

<div class="info">
<p><strong>📍 Kandukur, Hyderabad - Rangareddy</strong></p>
<p><strong>📞 +919848888076</strong></p>
<p><strong>⏰ 10:00 AM – 11:00 PM</strong></p>
</div>

<div class="buttons">
<div class="btn" onclick="openPopup('whatsapp')">WhatsApp</div>
<div class="btn" onclick="openPopup('call')">Call</div>
</div>
</div>

<!-- Franchise 1 -->
<div class="section">
<h2>jillelguda Branch</h2>
<div class="franchise">
<p>📞 +919848888076</p>

<div class="map">
<iframe 
src="https://www.google.com/maps?q=Kukatpally,Hyderabad&output=embed">
</iframe>
</div>
</div>
</div>

<!-- Franchise 2 -->
<div class="section">
<h2>kandukur Branch</h2>
<div class="franchise">
<p>📞 +919848888076</p>

<div class="map">
<iframe 
src="https://www.google.com/maps?q=17.0598967,78.4733308&output=embed">
</iframe>
</div>
</div>
</div>

<!-- Franchise 3 -->


</div>
</div>

<!-- Popup -->
<div class="popup" id="popup">
<div class="popup-content" id="popupContent"></div>
</div>

<script>
const mainNumber = "+919848888076";

function openPopup(type){
    let content = "";
    if(type==="whatsapp"){
        content = `
        <h3>Chat with us on WhatsApp 🌿</h3>
        <div class="btn" onclick="goWhatsApp()">Open WhatsApp</div>
        <div class="close" onclick="closePopup()">Close</div>`;
    }else{
        content = `
        <h3>Call Village Kitchen 📞</h3>
        <div class="btn" onclick="makeCall()">Call Now</div>
        <div class="close" onclick="closePopup()">Close</div>`;
    }
    document.getElementById("popupContent").innerHTML = content;
    document.getElementById("popup").style.display="flex";
}

function closePopup(){
    document.getElementById("popup").style.display="none";
}

function goWhatsApp(){
    window.location.href = "https://wa.me/" + mainNumber;
}

function makeCall(){
    window.location.href = "tel:+"+mainNumber;
}
</script>
<script>
function toggleMenu(){
  const leftNav = document.querySelector(".nav.left");
  
  leftNav.classList.toggle("show");
  
}

/* Auto close menu when link clicked (mobile UX) */
document.querySelectorAll(".nav a").forEach(link=>{
  link.addEventListener("click", ()=>{
    document.querySelectorAll(".nav").forEach(nav=>{
      nav.classList.remove("show");
    });
  });
});
</script>
</body>
</html>
