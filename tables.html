<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Select Table</title>

<style>
body{
  margin:0;
  font-family:Poppins;
  background:#4e342e;
}
.app{
  max-width:430px;
  margin:auto;
  padding:15px;
}
h2{
  text-align:center;
  color:#ffebcd;
}

/* TABLE BLOCKS */
.tables{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:12px;
  margin-top:20px;
}
.table{
  background:#8d6e63;
  color:#fff;
  height:70px;
  border-radius:14px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:700;
  cursor:pointer;
  box-shadow:inset 0 4px 6px rgba(255,255,255,0.2);
}
</style>
</head>

<body>
<div class="app">
<h2>🍽️ Select Table</h2>

<div class="tables">
<script>
for(let i=1;i<=20;i++){
  document.write(`
    <div class="table" onclick="selectTable(${i})">
      Table ${i}
    </div>
  `);
}

function selectTable(no){
  localStorage.setItem("table_no",no);
  window.location.href="cart.html";
}
</script>
</div>

</div>
</body>
</html>
